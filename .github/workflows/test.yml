name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Note: plugin supports PHP 8.1+ at runtime, but the test tooling
        # (PHPUnit 11.5+) requires PHP 8.2+. CI tests on 8.2-8.4 only.
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      # No vendor cache: composer.lock is gitignored, so there is nothing to key on
      # that actually pins the resolved dependency set. Keying on composer.json (bare
      # constraints) would restore a stale vendor/ under an unchanged key long after
      # the resolved versions moved. Dev deps install in seconds — correctness wins.
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Lint PHP files
        run: find . -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=always

      - name: Run Pint (code style check)
        run: vendor/bin/pint --test

      - name: Run PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  # The same checks the WordPress.org directory runs on submission. Catches
  # generic-prefix, escaping, readme and header regressions here instead of in
  # the review queue — the 1.3.0 prefix rename exists because a reviewer, not
  # CI, found the problem.
  plugin-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Check the artifact users actually get, not the raw checkout. `git archive`
      # applies .gitattributes export-ignore, so dist/ holds exactly the release zip's
      # contents — no .git, no tests/, no vendor/, no dev configs. Checking the
      # checkout instead would scan files that never ship and miss nothing that does.
      - name: Build the distribution tree
        run: |
          mkdir -p dist/appinio-chat
          git archive HEAD | tar x --directory=dist/appinio-chat
          find dist -type f | sort

      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./dist/appinio-chat
